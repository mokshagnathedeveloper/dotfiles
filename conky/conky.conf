--[[ conky-center-calendar.rc
A vertical clock/calendar - Battery at the TOP
v1.5 Adjusted for Top-Alignment
]]

conky.config = {
    own_window = true,
    own_window_type = 'normal',
    own_window_transparent = true,
    own_window_argb_visual = true,
    own_window_argb_value = 0,
    own_window_hints = 'undecorated,below,sticky,skip_taskbar,skip_pager',

    alignment = 'middle_left',
    gap_x = 290,
    gap_y = 0,
    minimum_width = 400,
    minimum_height = 900,

    draw_shades = true,
    default_shade_color = '000000',
    draw_outline = false,
    default_outline_color = 'DBC58F',
    use_xft = true,
    font = 'Anurati:size=10',
    uppercase = true,
    -- REMOVED line_adjust/line_spacing from here

    default_color = '284EC3',
    update_interval = 1,
    double_buffer = false,
    
    -- FORCE WAYLAND
    out_to_wayland = true,
    out_to_x = false,

    lua_load = '/home/Mokshagna/.config/conky/Vertical_clock.lua',
}

conky.text = [[
# 1. Start with a small gap
${voffset 110}

# 2. Weather at the TOP (Hardware Gold Icon / White Temp)
${voffset 10}${font Quicksand:size=35}${color DBC58F}󰖐 \
${voffset -5}${color B9DAF8}${execi 900 ~/.config/conky/weather.sh}${font}${color}


# 2. Horizontal Battery (Hardware Gold Icon / White Text)
#${font Quicksand:size=35}${if_match "${exec cat /sys/class/power_supply/AC/online}" == "1"}${color DBC58F}\
#${if_match ${battery_percent} > 80} ${else}${if_match ${battery_percent} > 40} ${else} ${endif}${endif}\
#${else}\
#${if_match ${battery_percent} <= 15}${color FF0000} ${else}${color 284EC3}\
#${if_match ${battery_percent} > 80} ${else}${if_match ${battery_percent} > 40} ${else} ${endif}${endif}${endif}${endif}\
#${color F9F9FB}${offset 15}${battery_percent}%${font}${color}

# 3. Day Name (Column 1) - REVERTED ALIGNMENT
${voffset -40}${color 284EC3}${font Anurati:size=100}${lua verticalize ${time %a} 60}${font}

# 4. Jump back up to align Column 2
${voffset -650}

# 5. Date (Column 2) - REVERTED ALIGNMENT
${color B9DAF8}${font Quicksand:size=30}${lua verticalize ${time %d %b %Y} 0}${font}

# 6. Time (Below the Date) - REVERTED ALIGNMENT
${voffset -60}${offset 0}${color B9DAF8}${font Quicksand:size=55}${time %H:%M}${font}
]]
