general {
    ignore_dbus_inhibit = false    # If an app (like a browser) says "don't sleep," hypridle listens
    lock_cmd = notify-send "lock!"
}

# REMOVE or COMMENT OUT all "listener" blocks.
# If there are no listeners, hypridle runs but never acts.

#listener {
    timeout = 600                                # 10 mins
    on-timeout = hyprctl dispatch dpms off       # turn off monitor
    on-resume = hyprctl dispatch dpms on         # turn on monitor
}

# NOTE: There is NO 'systemctl suspend' listener here, so it won't sleep.
