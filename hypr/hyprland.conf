# #######################################################################################
# MOKSHAGNA'S HYPRLAND CONFIG - FINALIZED APRIL 13, 2026
# #######################################################################################

#################
### VARIABLES ###
#################
$mainMod = SUPER
$terminal = kitty
$fileManager = kitty -e yazi
$menu = wofi --show drun
$browser = zen-browser

env = XDG_CURRENT_DESKTOP,Hyprland
env = XDG_SESSION_TYPE,wayland
env = QS_ICON_THEME,Papirus-Dark
env = XCURSOR_THEME,Empty-Butterfly-Blue
env = XCURSOR_SIZE,48
env = HYPRCURSOR_SIZE,48

################
### MONITORS ###
################
monitor = eDP-1, 1920x1080@120, 0x0, 1
env = WLR_DRM_DEVICES,/dev/dri/card1:/dev/dri/card0
env = AQ_DRM_DEVICES,/dev/dri/card1:/dev/dri/card0

#################
### AUTOSTART ###
#################
exec-once = dbus-update-activation-environment --systemd WAYLAND_DISPLAY XDG_CURRENT_DESKTOP
exec-once = /usr/lib/xdg-desktop-portal-hyprland
exec-once = systemctl --user start hyprpolkitagent

# Services & Tools
exec-once = waybar & hyprpaper & conky & blueman-applet 
exec-once = batsignal -w 20 -c 10 -d 5 -f 80
exec-once = wl-paste --type text --watch cliphist store
exec-once = wl-paste --type image --watch cliphist store
exec-once = hyprctl setcursor Empty-Butterfly-Blue 48

# Logic & Multimedia
exec-once = sleep 2 && SDL_AUDIODRIVER=dummy prime-run linux-wallpaperengine /home/Mokshagna/.local/share/Steam/steamapps/workshop/content/431960/3556568863 --silent --fps 30 --screen-root eDP-1 --volume 0 --disable-mouse --disable-parallax --scaling fill --max-memory-usage 1024 --no-audio-processing --no-sync --geometry 1920x1080 --disable-audio
exec-once = ~/.config/hypr/wp-auto-pause.sh
exec-once = pw-play --volume=0.3 /home/Mokshagna/Downloads/kuru-kuru-herta-made-with-Voicemod.mp3

#####################
### LOOK AND FEEL ###
#####################
general {
    gaps_in = 5
    gaps_out = 10
    border_size = 2
    col.active_border = rgba(284ec3ff) rgba(b9daf8ff) 90deg
    col.inactive_border = rgba(595959aa)
    layout = dwindle
    resize_on_border = false
    allow_tearing = false
}

decoration {
    rounding = 10
    shadow {
       enabled = false
        range = 4
        render_power = 3
        color = rgba(1a1a1aee)
    }
    blur {
        enabled = false
        size = 3
        passes = 1
        vibrancy = 0.1696
    }
}

animations {
    enabled = true
    bezier = fluent_decel, 0, 1, 0, 1
    animation = windows, 1, 10, fluent_decel, popin 80%
    animation = fade, 1, 4, default
    animation = workspaces, 1, 4, fluent_decel, slide
}

dwindle {
    preserve_split = true
    smart_split = false
}

####################################
### UNIFIED WINDOW RULES (v0.54) ###
####################################
windowrule = match:class ^(wofi)$, float on
windowrule = match:class ^(wofi)$, center on
windowrule = match:class ^(wofi)$, stay_focused on

windowrule = match:class ^(floating_wifi)$, float on
windowrule = match:class ^(floating_wifi)$, center on
windowrule = match:class ^(floating_wifi)$, size 600 400

windowrule = match:class .*, suppress_event maximize

#################
###   INPUT   ###
#################
input {
    kb_layout = us
    follow_mouse = 1
    sensitivity = 0
    accel_profile = flat
    touchpad {
        natural_scroll = false
    }
}

gesture = 3, horizontal, workspace

###################
### KEYBINDINGS ###
###################

# Apps
bind = $mainMod, K, exec, $terminal
bind = $mainMod, L, exec, hyprlock
bind = Alt, f4, killactive
bind = $mainMod, M, exec, wlogout
bind = $mainMod, E, exec, $fileManager
bind = $mainMod, V, togglefloating
bind = $mainMod, R, exec, $menu
bind = $mainMod SHIFT, R, exec, wofi --show run
bind = $mainMod, B, exec, $browser
bind = $mainMod, Prior, fullscreen, 1
bind = $mainMod, f11, fullscreen, 0

# Tools
bind = $mainMod, Z, exec, /home/Mokshagna/.config/hypr/scripts/toggle_wallpaper.sh
bind = $mainMod, C, exec, cliphist list | wofi -dmenu | cliphist decode | wl-copy
bind = $mainMod, N, exec, kitty --class floating_wifi -e nmtui
bind = $mainMod SHIFT, S, exec, hyprshot -m region
bind = $mainMod SHIFT, V, exec, copyq toggle

# Workspaces (1-10) & Moving Windows
bind = $mainMod, 1, workspace, 1
bind = $mainMod, 2, workspace, 2
bind = $mainMod, 3, workspace, 3
bind = $mainMod, 4, workspace, 4
bind = $mainMod, 5, workspace, 5
bind = $mainMod, 6, workspace, 6
bind = $mainMod, 7, workspace, 7
bind = $mainMod, 8, workspace, 8
bind = $mainMod, 9, workspace, 9
bind = $mainMod, 0, workspace, 10

bind = $mainMod SHIFT, 1, movetoworkspace, 1
bind = $mainMod SHIFT, 2, movetoworkspace, 2
bind = $mainMod SHIFT, 3, movetoworkspace, 3
bind = $mainMod SHIFT, 4, movetoworkspace, 4
bind = $mainMod SHIFT, 5, movetoworkspace, 5
bind = $mainMod SHIFT, 6, movetoworkspace, 6
bind = $mainMod SHIFT, 7, movetoworkspace, 7
bind = $mainMod SHIFT, 8, movetoworkspace, 8
bind = $mainMod SHIFT, 9, movetoworkspace, 9
bind = $mainMod SHIFT, 0, movetoworkspace, 10

# Dell G15 Keys
bindl  = , XF86AudioMute, exec, wpctl set-mute @DEFAULT_AUDIO_SINK@ toggle
bindel = , XF86AudioLowerVolume, exec, wpctl set-volume @DEFAULT_AUDIO_SINK@ 5%-
bindel = , XF86AudioRaiseVolume, exec, wpctl set-volume -l 1.5 @DEFAULT_AUDIO_SINK@ 5%+
bindl  = , XF86AudioPlay, exec, playerctl play-pause
bindel = , XF86MonBrightnessDown, exec, brightnessctl set 5%-
bindel = , XF86MonBrightnessUp, exec, brightnessctl set 5%+
bind = , XF86Display, exec, hyprctl dispatch togglespecialworkspace
bindl = , XF86KbdBrightnessUp, exec, brightnessctl -d *kbd_backlight* set 33%+
bindl = , XF86KbdBrightnessDown, exec, brightnessctl -d *kbd_backlight* set 33%-
bind = , code:210, exec, $terminal -e btop
bind = , code:107, exec, hyprshot -m output
bind = $mainMod, code:107, exec, hyprshot -m window
bind = , XF86Calculator, exec, galculator

# Navigation & Mouse
bind = $mainMod, left, movefocus, l
bind = $mainMod, right, movefocus, r
bind = $mainMod, up, movefocus, u
bind = $mainMod, down, movefocus, d

bind = $mainMod, P, pseudo,
bind = $mainMod, J, layoutmsg, togglesplit

bind = $mainMod, mouse_down, workspace, e+1
bind = $mainMod, mouse_up, workspace, e-1

bindm = $mainMod, mouse:272, movewindow
bindm = $mainMod, mouse:273, resizewindow
