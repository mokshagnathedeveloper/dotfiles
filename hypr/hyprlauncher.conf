# General behavior
general {
    grab_focus = true
}

# UI matching your Waybar style
ui {
    window_size = 600 400
    border_size = 2
    rounding = 12
    border_color = rgba(0, 255, 255, 1.0)
    bg_color = rgba(0, 0, 0, 0.6)
}

# Search and desktop app logic
finders {
    default_finder = desktop
    desktop_icons = true
}
