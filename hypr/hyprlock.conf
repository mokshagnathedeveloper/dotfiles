# #######################################################################################
# MOKSHAGNA'S HYPRLOCK CONFIG - MATCHING HYPRLAND THEME (MARCH 2026)
# #######################################################################################

general {
    no_fade_in = false
    grace = 0
    disable_loading = false
}

background {
    monitor = eDP-1
    # Using a blurred screenshot to match your live wallpaper colors
    path = screenshot
    color = rgba(25, 20, 20, 1.0)
    blur_passes = 3
    blur_size = 7
    noise = 0.0117
    contrast = 0.8916
    brightness = 0.8172
    vibrancy = 0.1696
}

# TIME
label {
    monitor = eDP-1
    text = $TIME
    color = rgb(b9daf8) # Matching your light blue border
    font_size = 120
    font_family = JetBrains Mono Nerd Font ExtraBold
    position = 0, -300
    halign = center
    valign = top
}

# USER GREETING
label {
    monitor = eDP-1
    text = Hello, Mokshagna #
    color = rgb(284ec3) # Matching your deep blue border
    font_size = 25
    font_family = JetBrains Mono Nerd Font
    position = 0, -40
    halign = center
    valign = center
}

# INPUT FIELD
input-field {
    monitor = eDP-1
    size = 250, 60
    outline_thickness = 3
    dots_size = 0.2
    dots_spacing = 0.2
    dots_center = true
    outer_color = rgba(284ec3ff) rgba(b9daf8ff) 45deg # Matching your border gradient
    inner_color = rgba(0, 0, 0, 0.5)
    font_color = rgb(200, 200, 200)
    fade_on_empty = false
    placeholder_text = <i>Enter Password...</i>
    hide_input = false
    position = 0, -120
    halign = center
    valign = center
}
