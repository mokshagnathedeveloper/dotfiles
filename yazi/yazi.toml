 [manager]

show_hidden = true

show_dotfiles = true

sort_by = "alphabetical"

sort_dir_first = true


[opener]

nvim = [

    { run = 'nvim "$@"', block = true, desc = "Open in NeoVim" }

]

nano = [

    { run = 'nano "$@"', block = true, desc = "Edit in Nano" }

]

# Image Viewer

image = [

    { run = 'imv "$@"', block = false, desc = "Open Image" },

]

# Media Player

video = [

    { run = 'mpv "$@"', block = false, desc = "Play Media" },

]

# Office Suite

office = [

    { run = 'libreoffice "$@"', block = false, desc = "LibreOffice" },

]


[open]

rules = [

    # 1. Catch by name (Higher priority)

    { url = "*.json",  use = [ "nvim", "nano" ] },

    { url = "*.jsonc", use = [ "nvim", "nano" ] },


    # 2. Add the specific MIME your 'file' command is reporting

    { mime = "application/json", use = [ "nvim", "nano" ] },

    { mime = "text/plain", use = [ "nvim", "nano" ] },


    # Ricing & Web (Split for safety)

    { url = "*.css",   use = [ "nvim", "nano" ] },

    { url = "*.scss",  use = [ "nvim", "nano" ] },

    { url = "*.html",  use = [ "nvim", "nano" ] },

    { url = "*.js",    use = [ "nvim", "nano" ] },


    # System Configs

    { url = "*.conf",  use = [ "nvim", "nano" ] },

    { url = "*.toml",  use = [ "nvim", "nano" ] },

    { url = "*.lua",   use = [ "nvim", "nano" ] },

    { url = "*.sh",    use = [ "nvim", "nano" ] },

    { url = "*.fish",  use = [ "nvim", "nano" ] },

    

    # MIME Fallbacks

    { mime = "text/*",  use = [ "nvim", "nano" ] },

    { mime = "image/*", use = [ "image" ] },

    { mime = "video/*", use = [ "video" ] },

    { mime = "audio/*", use = [ "video" ] },


    # Documents

    { url = "*.doc",   use = [ "office" ] },

    { url = "*.docx",  use = [ "office" ] },

    { url = "*.pdf",   use = [ "office" ] },


    # The Final Catch-all

    { url = "*",       use = [ "nano", "nvim" ] }

] 
